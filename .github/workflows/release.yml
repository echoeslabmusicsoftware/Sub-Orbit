name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BUILD_DIR: build

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-macos-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-macos-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Locate artefacts
        run: |
          VST3_PATH="$(find build/SubOrbit_artefacts/Release/VST3 -type d -name '*.vst3' -print -quit)"
          AU_PATH="$(find build/SubOrbit_artefacts/Release/AU -type d -name '*.component' -print -quit)"
          echo "VST3_PATH=$VST3_PATH" >> "$GITHUB_ENV"
          echo "AU_PATH=$AU_PATH" >> "$GITHUB_ENV"

      - name: Ad-hoc codesign
        run: |
          for artefact in "$VST3_PATH" "$AU_PATH"; do
            if [ -n "$artefact" ] && [ -d "$artefact" ]; then
              codesign --force --deep -s - "$artefact"
            fi
          done

      - name: Build component packages
        run: |
          mkdir -p release-artifacts

          if [ -n "$VST3_PATH" ] && [ -d "$VST3_PATH" ]; then
            pkgbuild \
              --root "$VST3_PATH" \
              --install-location "/Library/Audio/Plug-Ins/VST3/$(basename "$VST3_PATH")" \
              --identifier com.echoeslab.suborbit.vst3 \
              --version "$VERSION" \
              --scripts packaging/mac/scripts-vst3 \
              SubOrbit-VST3.pkg
          fi

          if [ -n "$AU_PATH" ] && [ -d "$AU_PATH" ]; then
            pkgbuild \
              --root "$AU_PATH" \
              --install-location "/Library/Audio/Plug-Ins/Components/$(basename "$AU_PATH")" \
              --identifier com.echoeslab.suborbit.au \
              --version "$VERSION" \
              --scripts packaging/mac/scripts-au \
              SubOrbit-AU.pkg
          fi

      - name: Build installer package
        run: |
          productbuild \
            --distribution packaging/mac/distribution.xml \
            --resources packaging/mac/ \
            --package-path . \
            "release-artifacts/SubOrbit-macOS-Installer.pkg"

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          for f in *.pkg; do
            shasum -a 256 "$f" >> SHA256SUMS.txt
          done

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-artifacts

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-windows-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: packaging/windows/installer.iss
          options: /DMyAppVersion=${{ env.VERSION }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          Copy-Item "packaging/windows/Output/*.exe" "release-artifacts/"

      - name: Generate checksums
        shell: pwsh
        working-directory: release-artifacts
        run: |
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -Encoding ascii SHA256SUMS.txt
          }

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-artifacts

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            mesa-common-dev \
            libgl-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-linux-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-linux-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Locate artefacts
        run: |
          VST3_PATH="$(find build/SubOrbit_artefacts -type d -name '*.vst3' -print -quit)"
          echo "VST3_PATH=$VST3_PATH" >> "$GITHUB_ENV"

      - name: Build .deb package
        run: |
          mkdir -p release-artifacts
          chmod +x packaging/linux/build-deb.sh
          ./packaging/linux/build-deb.sh "$VERSION" "$VST3_PATH"
          cp suborbit_*.deb release-artifacts/

      - name: Package tar.gz
        run: |
          if [ -n "$VST3_PATH" ]; then
            tar -czf "release-artifacts/SubOrbit-Linux-VST3.tar.gz" -C "$(dirname "$VST3_PATH")" "$(basename "$VST3_PATH")"
          fi

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          sha256sum *.deb *.tar.gz > SHA256SUMS.txt 2>/dev/null || true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-artifacts

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Consolidate release files
        run: |
          mkdir -p release-final
          cp all-artifacts/release-macos/*.pkg release-final/ 2>/dev/null || true
          cp all-artifacts/release-windows/*.exe release-final/ 2>/dev/null || true
          cp all-artifacts/release-linux/*.deb release-final/ 2>/dev/null || true
          cp all-artifacts/release-linux/*.tar.gz release-final/ 2>/dev/null || true

          # Merge per-platform checksums into one file
          cat all-artifacts/release-macos/SHA256SUMS.txt >> release-final/SHA256SUMS.txt 2>/dev/null || true
          cat all-artifacts/release-windows/SHA256SUMS.txt >> release-final/SHA256SUMS.txt 2>/dev/null || true
          cat all-artifacts/release-linux/SHA256SUMS.txt >> release-final/SHA256SUMS.txt 2>/dev/null || true

      - name: Create release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## Download

          | Platform | Installer | Manual |
          |----------|-----------|--------|
          | **macOS** (Universal) | `SubOrbit-macOS-Installer.pkg` | -- |
          | **Windows** (x64) | `SubOrbit-Windows-Installer.exe` | -- |
          | **Linux** (x64) | `suborbit_VERSION_amd64.deb` | `SubOrbit-Linux-VST3.tar.gz` |

          ## Installation

          **macOS:** Double-click the `.pkg` file and follow the prompts. Both VST3 and AU plugins are installed to the system plugin directories. You may need to right-click the file and select Open the first time, since the installer is not notarized.

          **Windows:** Run the `.exe` installer. The VST3 plugin is installed to `C:\Program Files\Common Files\VST3\`. SmartScreen may show a warning — click "More info" then "Run anyway".

          **Linux:** Install with `sudo dpkg -i suborbit_*.deb` or extract the `.tar.gz` to `~/.vst3/`.

          After installing, rescan plugins in your DAW.

          ## Verify your download

          Each release includes `SHA256SUMS.txt`. To verify:

          ```bash
          # macOS / Linux
          sha256sum -c SHA256SUMS.txt
          ```

          See [INSTALL.md](https://github.com/$REPO/blob/main/INSTALL.md) for more details.
          NOTES
          sed -i 's/^          //' release-notes.md
          sed -i "s/VERSION/$VERSION/g" release-notes.md
          sed -i "s|\$REPO|${{ github.repository }}|g" release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "SUB ORBIT $TAG" \
            --notes-file release-notes.md \
            release-final/*
