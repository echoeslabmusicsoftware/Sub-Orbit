<h2>SUB ORBIT</h2>
<p>Mono-safe low-end stereoizer by Echoes Lab.</p>
<p>This installer will place the VST3 and Audio Unit plugins in your system plugin directories:</p>
<ul>
    <li><strong>VST3</strong> &rarr; /Library/Audio/Plug-Ins/VST3/</li>
    <li><strong>AU</strong> &rarr; /Library/Audio/Plug-Ins/Components/</li>
</ul>
<p>After installation, rescan plugins in your DAW.</p>
